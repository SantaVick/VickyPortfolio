server:
  port: 8005

spring:
  application:
    name: victor-portfolio

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    servlet:
      content-type: text/html

  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 3600

portfolio:
  email:
    sender: ${PORTFOLIO_EMAIL_SENDER:noreply@victorportfolio.com}
    recipient: ${PORTFOLIO_EMAIL_RECIPIENT:njihiavictor754@gmail.com}

# SendGrid API Key (never hardcode)
SENDGRID_API_KEY: ${SENDGRID_API_KEY}

logging:
  level:
    root: INFO
    com.portfolio.MyPortfolio: DEBUG