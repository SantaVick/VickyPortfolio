server:
  port: 8005

spring:
  application:
    name: victor-portfolio

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    servlet:
      content-type: text/html

  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 3600

  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    password: ${SENDGRID_API_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

portfolio:
  email:
    sender: ${PORTFOLIO_EMAIL_SENDER:noreply@victorportfolio.com}
    recipient: ${PORTFOLIO_EMAIL_RECIPIENT:njihiavictor754@gmail.com}

logging:
  level:
    root: INFO
    com.portfolio.MyPortfolio: DEBUG