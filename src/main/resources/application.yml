server:
  port: 8005

spring:
  application:
    name: victor-portfolio

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    servlet:
      content-type: text/html

  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 3600

mailgun:
  domain: ${MAILGUN_DOMAIN}
  api-key: ${MAILGUN_API_KEY}
  sender: ${MAILGUN_SENDER:noreply@victorportfolio.com}
  recipient: ${MAILGUN_RECIPIENT:njihiavictor754@gmail.com}

logging:
  level:
    root: INFO
    com.portfolio.MyPortfolio: DEBUG